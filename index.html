<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Gap - GAM Lab</title>
    
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>

    <style>
        body {
            margin: 0; padding: 0; background-color: #333;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center;
            min-height: 100vh; font-family: 'Arial', sans-serif; color: white;
            overflow: hidden;
        }
        #game-container {
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            border-radius: 12px;
            overflow: hidden;
            border: 4px solid #555;
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 400,
            height: 600,
            parent: 'game-container',
            physics: {
                default: 'arcade',
                arcade: { gravity: { y: 1200 }, debug: false }
            },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player, pipes, score = 0, gameState = 'BOOT'; 
        let currentProblem = { q: '', a: 0, d: 0, correctGap: '' };
        let pipeSpeed = -220, spawnTimer, scoreText, questionText, menuText, highScoreText;

        // Fetch high score from local storage (defaults to 0 if not found)
        let highScore = localStorage.getItem('mathGapHighScore') || 0;

        function preload() {
            let birdGraphics = this.make.graphics({ x: 0, y: 0, add: false });
            birdGraphics.fillStyle(0xFFFF00, 1);
            birdGraphics.fillCircle(15, 15, 15);
            birdGraphics.lineStyle(2, 0x000000, 1);
            birdGraphics.strokeCircle(15, 15, 15);
            birdGraphics.generateTexture('bird', 30, 30);

            let pipeGraphics = this.make.graphics({ x: 0, y: 0, add: false });
            pipeGraphics.fillStyle(0x2ecc71, 1);
            pipeGraphics.fillRect(0, 0, 60, 600);
            pipeGraphics.lineStyle(4, 0x27ae60, 1);
            pipeGraphics.strokeRect(2, 0, 56, 600);
            pipeGraphics.generateTexture('pipe', 60, 600);
        }

        function create() {
            this.cameras.main.setBackgroundColor('#70c5ce');
            pipes = this.physics.add.group();
            
            player = this.physics.add.sprite(100, 300, 'bird');
            player.setCircle(15);
            player.body.allowGravity = false;
            player.visible = false;
            player.setDepth(10);

            questionText = this.add.text(200, 60, '', { 
                fontSize: '32px', fill: '#fff', stroke: '#000', strokeThickness: 5,
                wordWrap: { width: 380 }, align: 'center' 
            }).setOrigin(0.5).setDepth(20);

            scoreText = this.add.text(200, 110, 'Score: 0', { fontSize: '22px', fill: '#fff', fontWeight: 'bold' }).setOrigin(0.5).setDepth(20);
            
            // New High Score display element
            highScoreText = this.add.text(200, 140, `Best: ${highScore}`, { fontSize: '18px', fill: '#FFD700', fontWeight: 'bold' }).setOrigin(0.5).setDepth(20);

            menuText = this.add.text(200, 300, '', { 
                fontSize: '24px', fill: '#fff', align: 'center', stroke: '#000', strokeThickness: 4,
                wordWrap: { width: 350 } 
            }).setOrigin(0.5).setDepth(20);
            
            menuText.setText(`MATH GAP\n\nHigh Score: ${highScore}\n\nTap to Start`);

            this.input.on('pointerdown', () => handleInput(this));
            
            this.physics.add.collider(player, pipes, (p, pipe) => {
                if (!pipe.isSensor) gameOver.call(this, "Ouch! You hit a pillar.");
            });

            gameState = 'MENU';
        }

        function update() {
            if (gameState === 'PLAYING') {
                player.angle = Phaser.Math.Clamp(player.body.velocity.y * 0.1, -20, 90);
                
                if (player.y > 600 || player.y < 0) gameOver.call(this, "You flew off the map!");
                
                pipes.children.iterate(child => {
                    if (!child) return;

                    if (child.isSensor && !child.passed && player.x > child.x) {
                        child.passed = true;
                        
                        if (Math.abs(player.y - child.y) < 100) { 
                            if (child.val === child.correctVal) {
                                score++;
                                scoreText.setText('Score: ' + score);
                                generateMathProblem(); 
                            } else {
                                gameOver.call(this, "Math Error!\nIncorrect answer.");
                            }
                        }
                    }

                    if (child.x < -100) child.destroy();
                });
            }
        }

        function handleInput(scene) {
            if (gameState === 'MENU') startGame(scene);
            else if (gameState === 'PLAYING') player.setVelocityY(-350);
            else if (gameState === 'GAMEOVER') scene.scene.restart();
        }

        function startGame(scene) {
            gameState = 'PLAYING';
            menuText.visible = false;
            player.visible = true;
            player.body.allowGravity = true;
            player.setPosition(100, 300);
            player.setVelocity(0, 0);
            score = 0;
            scoreText.setText('Score: 0');
            
            generateMathProblem();
            spawnPipes(scene);
            
            spawnTimer = scene.time.addEvent({ 
                delay: 2400, 
                callback: () => spawnPipes(scene), 
                loop: true 
            });
        }

        function generateMathProblem() {
            const isMultiplication = Math.random() > 0.5;
            
            if (isMultiplication) {
                let a = Phaser.Math.Between(2, 10);
                let b = Phaser.Math.Between(2, 5);
                currentProblem.q = `${a} × ${b} = ?`;
                currentProblem.a = a * b;
            } else {
                let a = Phaser.Math.Between(1, 20);
                let b = Phaser.Math.Between(1, 20);
                currentProblem.q = `${a} + ${b} = ?`;
                currentProblem.a = a + b;
            }

            let distractor = currentProblem.a + Phaser.Math.RND.pick([-3, -2, -1, 1, 2, 3]);
            if (distractor < 0) distractor = currentProblem.a + 4;
            
            currentProblem.d = distractor;
            currentProblem.correctGap = Math.random() > 0.5 ? 'top' : 'bottom';
            questionText.setText(currentProblem.q);
        }

        function spawnPipes(scene) {
            if (gameState !== 'PLAYING') return;
            const gapSize = 190;
            const x = 450;
            const midY = Phaser.Math.Between(220, 380);
            
            let pTop = pipes.create(x, midY - gapSize - 300, 'pipe');
            let pMid = pipes.create(x, midY, 'pipe'); pMid.setDisplaySize(60, 60); 
            let pBot = pipes.create(x, midY + gapSize + 300, 'pipe');

            [pTop, pMid, pBot].forEach(p => { 
                p.body.allowGravity = false; 
                p.body.immovable = true; 
                p.setVelocityX(pipeSpeed); 
                p.isSensor = false;
            });

            let topVal = currentProblem.correctGap === 'top' ? currentProblem.a : currentProblem.d;
            let botVal = currentProblem.correctGap === 'bottom' ? currentProblem.a : currentProblem.d;

            let tTop = scene.add.text(x, midY - (gapSize/2), topVal, { fontSize: '32px', fill: '#000', fontWeight: 'bold' }).setOrigin(0.5).setDepth(15);
            let tBot = scene.add.text(x, midY + (gapSize/2), botVal, { fontSize: '32px', fill: '#000', fontWeight: 'bold' }).setOrigin(0.5).setDepth(15);

            let sTop = pipes.create(x, midY - (gapSize/2), null);
            sTop.setVisible(false);
            sTop.body.setEnable(false);
            sTop.isSensor = true;
            sTop.val = topVal;
            sTop.correctVal = currentProblem.a;
            sTop.passed = false;

            let sBot = pipes.create(x, midY + (gapSize/2), null);
            sBot.setVisible(false);
            sBot.body.setEnable(false);
            sBot.isSensor = true;
            sBot.val = botVal;
            sBot.correctVal = currentProblem.a;
            sBot.passed = false;

            scene.events.on('update', () => {
                if (tTop.active) {
                    tTop.x = pTop.x;
                    tBot.x = pTop.x;
                    sTop.x = pTop.x;
                    sBot.x = pTop.x;
                }
            });
        }

        function gameOver(reason) {
            if (gameState === 'GAMEOVER') return;
            gameState = 'GAMEOVER';
            if (spawnTimer) spawnTimer.remove();
            this.physics.pause();
            player.setTint(0xff0000);
            
            // Handle High Score Logic
            let newRecord = false;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('mathGapHighScore', highScore);
                newRecord = true;
            }

            questionText.setText("GAME OVER");
            
            let message = `${reason}\n\nFinal Score: ${score}\n`;
            if (newRecord) message += "🏆 NEW HIGH SCORE! 🏆\n";
            else message += `High Score: ${highScore}\n`;
            message += "\nTap to Restart";

            menuText.setText(message);
            menuText.visible = true;
        }
    </script>
</body>
</html>
